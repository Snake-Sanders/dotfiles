# TMUX CONFIG
# File: ~/.config/tmux/tmux.conf
#
# Reload inside tmux with: Prefix + r
# Install plugins with TPM: Prefix + I
# Update plugins: Prefix + U
# Remove unused plugins: Prefix + Alt + u

# ------------------------------------------------------------------
# RELOAD / QUALITY OF LIFE
# ------------------------------------------------------------------

# Reload this config quickly.
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Swap current pane with the next one.
bind x swap-pane -D

# ------------------------------------------------------------------
# EDITOR / COPY MODE BEHAVIOR
# ------------------------------------------------------------------

# Use Vim-style keys in copy mode and command mode.
setw -g mode-keys vi

# Copy mode:
#   Prefix + [      enter copy mode
#   v               begin selection
#   Ctrl-v          rectangle selection
#   y or Enter      copy and leave copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ------------------------------------------------------------------
# PANE NAVIGATION / SPLITS
# ------------------------------------------------------------------

# Move between panes with home-row keys.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes and keep the current working directory.
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# ------------------------------------------------------------------
# GENERAL TMUX OPTIONS
# ------------------------------------------------------------------

set -g mouse on
set -g default-terminal "tmux-256color"

# Start window numbering at 1 instead of 0.
set -g base-index 1

# Remove the delay after pressing Escape.
set -g escape-time 0

# Large scrollback history.
set -g history-limit 1000000

# Renumber windows after one is closed.
set -g renumber-windows on

# Let tmux integrate with the system clipboard.
set -g set-clipboard on

# Put the status bar at the top.
set -g status-position top

# Keep manual window names. Do not let programs or tmux rename them.
set -g allow-rename off
set -g automatic-rename off

# Fallback plain tmux window labels.
# Catppuccin will usually override these, but they are still good defaults.
set -g window-status-format '#I:#W'
set -g window-status-current-format '#I:#W'

# ------------------------------------------------------------------
# TPM / PLUGIN INSTALL LOCATION
# ------------------------------------------------------------------

# Force TPM-managed plugins to live under ~/.config/tmux/plugins
# so the plugin install path matches this config directory.
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# ------------------------------------------------------------------
# PLUGINS
# ------------------------------------------------------------------

# Theme
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Navigation / helpers
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# TPM itself must be listed too.
set -g @plugin 'tmux-plugins/tpm'

# ------------------------------------------------------------------
# CATPPUCCIN THEME
# ------------------------------------------------------------------

set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'left'

# Show the real tmux window name, not the pane title / hostname.
set -g @catppuccin_window_text ' #I:#W'
set -g @catppuccin_window_current_text ' #I:#W#{?window_zoomed_flag,(),}'
set -g @catppuccin_window_current_fill 'number'

# Small visual tweaks.
set -g @catppuccin_status_module_text_bg "#{E:@thm_mantle}"
set -g @catppuccin_window_current_color "#{E:@thm_surface_2}"

# ------------------------------------------------------------------
# STATUS BAR
# ------------------------------------------------------------------

set -g status-interval 5

set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session} "

set -g status-right-length 100
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_cpu}"

# ------------------------------------------------------------------
# FLOAX
# ------------------------------------------------------------------

# Open Floax with Ctrl-p without needing the tmux prefix.
bind -n C-p run-shell ~/.config/tmux/plugins/tmux-floax/scripts/floax.sh

# ------------------------------------------------------------------
# SESSION RESTORE
# ------------------------------------------------------------------

set -g @continuum-restore 'on'

# ------------------------------------------------------------------
# TPM INITIALIZATION
# IMPORTANT: keep this at the very bottom
# ------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
